server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve the api container on every TTL instead of pinning its IP at
    # startup. A static proxy_pass caches the IP forever, so any
    # `docker compose up --build api` gives the api a new IP and the
    # storefront 502s until nginx restarts. The variable forces per-request
    # resolution via Docker's embedded DNS; variable proxy_pass does not
    # forward the URI, hence the explicit rewrite.
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $api_upstream http://api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header traceparent $http_traceparent;
    }

    location / {
        try_files $uri /index.html;
    }
}
