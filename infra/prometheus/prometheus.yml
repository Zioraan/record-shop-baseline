global:
  scrape_interval: 10s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs: [{ targets: ["api:8000"] }]
  - job_name: outbox-relay
    static_configs: [{ targets: ["outbox-relay:9101"] }]
  - job_name: stream-processor
    static_configs: [{ targets: ["stream-processor:9102"] }]
  - job_name: audit-sink
    static_configs: [{ targets: ["audit-sink:9103"] }]
